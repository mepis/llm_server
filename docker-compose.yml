version: '3.8'

services:
  llm-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/llm_server.db
      - LLAMA_CPP_DIR=/app/llama.cpp
    volumes:
      # Persist database
      - llm_server_data:/app/data
      # Persist models
      - llm_server_models:/app/models
      # Persist llama.cpp builds
      - llm_server_llama:/app/llama.cpp
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - llm-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  llm_server_data:
    driver: local
  llm_server_models:
    driver: local
  llm_server_llama:
    driver: local

networks:
  llm-network:
    driver: bridge
